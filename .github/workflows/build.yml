name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release
      
    - name: Pack
      run: |
        dotnet pack src/AeroDriver.Core/AeroDriver.Core.csproj --configuration Release --no-build --output ${{ github.workspace }}/artifacts
        dotnet pack src/AeroDriver.CLI/AeroDriver.CLI.csproj --configuration Release --no-build --output ${{ github.workspace }}/artifacts
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: packages
        path: ${{ github.workspace }}/artifacts/
        retention-days: 1
